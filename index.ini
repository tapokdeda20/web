<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ландшафтный дизайн</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#f2f2f2;
}

/* HEADER */

header{
    background:white;
    padding:20px 10%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav a{
    margin:0 15px;
    text-decoration:none;
    color:#444;
    font-size:14px;
}

.phone{
    font-weight:bold;
}

.btn{
    background:#ff6a00;
    color:white;
    padding:10px 20px;
    border-radius:20px;
    text-decoration:none;
}

/* HERO */

.hero{
    background:url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6") center/cover;
    height:450px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
}

.hero h1{
    font-size:40px;
}

.hero p{
    margin:20px 0;
}

/* SERVICES */

.services{
    background:#94a800;
    padding:40px 10%;
    display:flex;
    justify-content:space-between;
    color:white;
}

.service{
    text-align:center;
    width:30%;
}

/* CARDS */

.cards{
    padding:60px 10%;
    display:flex;
    gap:30px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
}

.card-content{
    padding:20px;
    text-align:center;
}

.card button{
    background:#ff6a00;
    border:none;
    color:white;
    padding:10px 25px;
    border-radius:20px;
    margin-top:10px;
}

/* ABOUT */

.about{
    padding:60px 10%;
    display:flex;
    align-items:center;
    gap:40px;
}

.about img{
    width:50%;
    border-radius:10px;
}

.about-text{
    background:white;
    padding:30px;
}

/* FEATURES */

.features{
    padding:60px 10%;
    text-align:center;
}

.feature-list{
    margin-top:30px;
    display:flex;
    justify-content:space-between;
}

.feature{
    width:18%;
}

/* PROCESS */

.process{
    background:#333;
    color:white;
    padding:60px 10%;
    text-align:center;
}

.steps{
    display:flex;
    justify-content:space-between;
    margin-top:40px;
}

.step{
    width:15%;
}

.circle{
    width:40px;
    height:40px;
    background:#ff6a00;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    margin-bottom:10px;
}

/* REVIEWS */

.reviews{
    padding:60px 10%;
    text-align:center;
}

.review-list{
    margin-top:40px;
    display:flex;
    justify-content:space-between;
}

.review{
    width:30%;
}

.review img{
    width:80px;
    border-radius:50%;
}

/* FOOTER */

footer{
    background:#ff6a00;
    color:white;
    text-align:center;
    padding:30px;
}

</style>
</head>

<body>

<header>

<div><b>Название компании</b></div>

<nav>
<a href="#">Главная</a>
<a href="#">Услуги</a>
<a href="#">О компании</a>
<a href="#">Отзывы</a>
<a href="#">Контакты</a>
</nav>

<div>
<span class="phone">+7 (123) 123-45-67</span>
<a class="btn" href="#">Заказать звонок</a>
</div>

</header>

<section class="hero">

<div>
<h1>Разработка проекта ландшафтной организации</h1>
<p>Создадим красивый и уютный сад</p>
<a class="btn" href="#">Отправить заявку</a>
</div>

</section>

<section class="services">

<div class="service">
<h3>Ландшафтное проектирование</h3>
<p>Создание современного дизайна участка</p>
</div>

<div class="service">
<h3>Благоустройство</h3>
<p>Озеленение и оформление сада</p>
</div>

<div class="service">
<h3>Автоматический полив</h3>
<p>Современные системы полива</p>
</div>

</section>

<section class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1466692476868-aef1dfb1e735">
<div class="card-content">
<h3>Ландшафтный дизайн</h3>
<p>Создание красивых садов</p>
<button>Заказать</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e">
<div class="card-content">
<h3>Посадка растений</h3>
<p>Деревья и кустарники</p>
<button>Заказать</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1502082553048-f009c37129b9">
<div class="card-content">
<h3>Пруды и водоемы</h3>
<p>Декоративные водные объекты</p>
<button>Заказать</button>
</div>
</div>

</section>

<section class="about">

<div class="about-text">
<h2>О компании</h2>
<p>
Мы создаем уникальные ландшафтные проекты.
Наша команда профессионалов помогает
создать идеальный сад.
</p>
</div>

<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">

</section>

<section class="features">

<h2>Почему именно мы?</h2>

<div class="feature-list">

<div class="feature">
<h4>Креативность</h4>
<p>Современные идеи</p>
</div>

<div class="feature">
<h4>Ассортимент</h4>
<p>Большой выбор растений</p>
</div>

<div class="feature">
<h4>Ценообразование</h4>
<p>Доступные цены</p>
</div>

<div class="feature">
<h4>Оперативность</h4>
<p>Быстрое выполнение</p>
</div>

<div class="feature">
<h4>Профессионализм</h4>
<p>Опытные дизайнеры</p>
</div>

</div>

</section>

<section class="process">

<h2>Последовательность выполнения работ</h2>

<div class="steps">

<div class="step">
<div class="circle">1</div>
<p>Заявка</p>
</div>

<div class="step">
<div class="circle">2</div>
<p>Выезд специалиста</p>
</div>

<div class="step">
<div class="circle">3</div>
<p>Оценка работ</p>
</div>

<div class="step">
<div class="circle">4</div>
<p>Договор</p>
</div>

<div class="step">
<div class="circle">5</div>
<p>Выполнение</p>
</div>

<div class="step">
<div class="circle">6</div>
<p>Сдача</p>
</div>

</div>

</section>

<section class="reviews">

<h2>Отзывы клиентов</h2>

<div class="review-list">

<div class="review">
<img src="https://randomuser.me/api/portraits/men/32.jpg">
<h4>Алексей</h4>
<p>Отличная работа, очень доволен!</p>
</div>

<div class="review">
<img src="https://randomuser.me/api/portraits/women/44.jpg">
<h4>Ирина</h4>
<p>Сад получился просто великолепный.</p>
</div>

<div class="review">
<img src="https://randomuser.me/api/portraits/men/55.jpg">
<h4>Олег</h4>
<p>Профессиональная команда.</p>
</div>

</div>

</section>

<footer>

<p>Получите 50% скидку на проект ландшафта</p>

</footer>

</body>
</html>